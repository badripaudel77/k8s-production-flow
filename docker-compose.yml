version: '3.8'
services:
  service-a:
    build: ./service-a
    ports:
      - "8080:8080"
    environment:
      - SPRING_APPLICATION_NAME=service-a
      - JAVA_OPTS=-Xms128m -Xmx256m
  service-b:
    build: ./service-b
    ports:
      - "8081:8081"
    environment:
      - SPRING_APPLICATION_NAME=service-b
      - SERVICEA_URL=http://service-a:8080/message
      - JAVA_OPTS=-Xms128m -Xmx256m
    depends_on:
      - service-a
